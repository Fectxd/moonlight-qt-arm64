name: Build Windows ARM64 (WOA)

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-woa:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt and ARM64 Host Tools
        shell: pwsh
        run: |
          # 1. Install x64 host (needed for windeployqt.exe etc.)
          aqt install-qt windows desktop 6.7.2 win64_msvc2019_64 -m qt5compat qtshadertools
          # 2. Install ARM64 target libraries
          aqt install-qt windows desktop 6.7.2 win64_msvc2019_arm64 -m qt5compat qtshadertools
          
          # Add Qt paths to GITHUB_PATH
          $Qt_ARM64_Bin = "${{ github.workspace }}/Qt/6.7.2/msvc2019_arm64/bin"
          $Qt_x64_Bin = "${{ github.workspace }}/Qt/6.7.2/msvc2019_64/bin"
          echo "$Qt_ARM64_Bin" >> $env:GITHUB_PATH
          echo "$Qt_x64_Bin" >> $env:GITHUB_PATH

      - name: Setup MSVC for ARM64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86_arm64 # Cross-compile for ARM64 on x64 host

      - name: Build Moonlight WOA
        shell: cmd
        run: |
          @echo off
          REM Ensure current scripts can find the right qmake
          set "PATH=%GITHUB_WORKSPACE%\Qt\6.7.2\msvc2019_arm64\bin;%PATH%"
          call scripts\build-arch.bat release
        env:
          CI_VERSION: ${{ github.run_number }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Moonlight-Windows-ARM64
          path: build/installer-release/*.zip
