name: Build Windows ARM64 (WOA)

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-woa:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt and ARM64 Host Tools
        shell: pwsh
        run: |
          # 1. Install x64 host (needed for windeployqt.exe etc.)
          aqt install-qt windows desktop 6.7.2 win64_msvc2019_64 -m qt5compat qtshadertools --outputdir D:/Qt
          # 2. Install ARM64 target libraries
          aqt install-qt windows desktop 6.7.2 win64_msvc2019_arm64 -m qt5compat qtshadertools --outputdir D:/Qt
          
          # Add Qt ARM64 bin to GITHUB_PATH
          $Qt_ARM64_Bin = "D:/Qt/6.7.2/msvc2019_arm64/bin"
          echo "$Qt_ARM64_Bin" >> $env:GITHUB_PATH

      - name: Build Moonlight WOA
        shell: cmd
        run: |
          @echo off
          REM Ensure 7-Zip is in PATH (common in GitHub Runners)
          set "PATH=C:\Program Files\7-Zip;D:\Qt\6.7.2\msvc2019_arm64\bin;%PATH%"
          call scripts\build-arch.bat release
        env:
          CI_VERSION: ${{ github.run_number }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Moonlight-Windows-ARM64
          path: build/installer-arm64-release/*.zip
